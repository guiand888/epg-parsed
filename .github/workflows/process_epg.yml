name: Process EPG for Emby

on:
  schedule:
    # 4 times daily at 5:08 AM, 11:08 AM, 5:08 PM, 11:08 PM Singapore time (UTC+8)
    # = 21:08, 03:08, 09:08, 15:08 UTC
    - cron: '8 21,3,9,15 * * *'
  workflow_dispatch:

jobs:
  process-epg:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Process EPG files
        run: |
          python process_epg.py
          
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add processed/
          git diff --cached --quiet || git commit -m "chore: update EPG files"
          git push
